name: publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.89.0

      - name: Authenticate to crates.io via Trusted Publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish issue-provider-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p issue-provider-core

      - name: Publish issue-provider-linear
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          for attempt in $(seq 1 10); do
            if cargo publish -p issue-provider-linear; then
              exit 0
            fi
            echo "issue-provider-core not resolvable yet (attempt ${attempt}); retrying in 30s"
            sleep 30
          done
          exit 1
