name: bump

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Crate to bump (or all for a workspace-wide release)"
        type: choice
        required: true
        options:
          - core
          - linear
          - jira
          - all
      level:
        description: "Semver bump level"
        type: choice
        required: true
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Rust
        run: rustup toolchain install 1.89.0 --profile minimal && rustup default 1.89.0

      - name: Compute tag from bump
        id: compute
        run: |
          cargo install cargo-edit --locked
          if [ "${{ inputs.target }}" = "all" ]; then
            OUT="$(cargo set-version --workspace --bump "${{ inputs.level }}" --dry-run 2>&1)"
            VER="$(echo "$OUT" | grep -oE 'to [0-9]+\.[0-9]+\.[0-9]+' | head -1 | awk '{print $2}')"
            echo "tag=workspace-v${VER}" >> "$GITHUB_OUTPUT"
          else
            OUT="$(cargo set-version -p "issue-provider-${{ inputs.target }}" --bump "${{ inputs.level }}" --dry-run 2>&1)"
            VER="$(echo "$OUT" | grep -oE 'to [0-9]+\.[0-9]+\.[0-9]+' | head -1 | awk '{print $2}')"
            echo "tag=${{ inputs.target }}-v${VER}" >> "$GITHUB_OUTPUT"
          fi
          test -n "$VER"

      - name: Create and push tag
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git tag "${{ steps.compute.outputs.tag }}"
          git push origin "${{ steps.compute.outputs.tag }}"
