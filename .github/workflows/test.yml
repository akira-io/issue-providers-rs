name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workspace:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust
        run: rustup toolchain install 1.89.0 --profile minimal --component clippy,rustfmt && rustup default 1.89.0
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy --all-targets --all-features -- -D warnings

  providers:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        package:
          - issue-provider-linear
          - issue-provider-jira
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust
        run: rustup toolchain install 1.89.0 --profile minimal --component clippy,rustfmt && rustup default 1.89.0
      - run: cargo test --package ${{ matrix.package }}
      - run: cargo clippy --package ${{ matrix.package }} --all-targets --all-features -- -D warnings
