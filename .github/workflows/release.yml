name: release

on:
  push:
    tags:
      - "core-v[0-9]+.[0-9]+.[0-9]+"
      - "core-v[0-9]+.[0-9]+.[0-9]+-*"
      - "linear-v[0-9]+.[0-9]+.[0-9]+"
      - "linear-v[0-9]+.[0-9]+.[0-9]+-*"
      - "jira-v[0-9]+.[0-9]+.[0-9]+"
      - "jira-v[0-9]+.[0-9]+.[0-9]+-*"
      - "workspace-v[0-9]+.[0-9]+.[0-9]+"
      - "workspace-v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DISCORD: ${{ secrets.DISCORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.89.0

      - name: Plan release from tag
        id: plan
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREFIX="${TAG%%-v*}"
          VERSION="${TAG#*-v}"
          if [ "$PREFIX" = "workspace" ]; then
            SHORTS="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.publish != []) | .name' | sed 's/^issue-provider-//')"
          else
            SHORTS="$PREFIX"
          fi
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "shorts=$(echo "$SHORTS" | xargs)" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        run: |
          cargo install cargo-edit --locked
          if [ "${{ steps.plan.outputs.prefix }}" = "workspace" ]; then
            cargo set-version --workspace "${{ steps.plan.outputs.version }}"
          else
            cargo set-version -p "issue-provider-${{ steps.plan.outputs.prefix }}" "${{ steps.plan.outputs.version }}"
          fi
          cargo update --workspace --offline || cargo update --workspace

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate per-crate CHANGELOGs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          for s in ${{ steps.plan.outputs.shorts }}; do
            git-cliff --config cliff.toml --include-path "crates/${s}/**" --tag "${{ steps.plan.outputs.version }}" --output "crates/${s}/CHANGELOG.md"
          done

      - name: Commit versions and changelogs
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          DEFAULT_BRANCH="$(git remote show origin | sed -n 's/.*HEAD branch: //p')"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): ${GITHUB_REF_NAME}"
          git push origin "HEAD:${DEFAULT_BRANCH}" || true

      - name: Extract release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PREFIX="${{ steps.plan.outputs.prefix }}"
          {
            echo 'body<<EOF'
            if [ "$PREFIX" = "workspace" ]; then
              git-cliff --config cliff.toml --latest --strip all
            else
              git-cliff --config cliff.toml --include-path "crates/${PREFIX}/**" --latest --strip all
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --latest

      - name: Send GitHub Release to Discord
        if: ${{ env.DISCORD != '' }}
        uses: SethCohen/github-releases-to-discord@v1.20.0
        with:
          webhook_url: ${{ secrets.DISCORD }}
          release_name: ${{ github.ref_name }}
          release_body: ${{ steps.notes.outputs.body }}
          release_html_url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          color: "3447003"
          username: "GitHub Releases"
          avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          content: "New issue-providers-rs release published."
          footer_title: "akira-io/issue-providers-rs"
          footer_icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          footer_timestamp: true
