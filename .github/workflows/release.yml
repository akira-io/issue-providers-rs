name: release

on:
  push:
    tags:
      - "core-v[0-9]+.[0-9]+.[0-9]+"
      - "core-v[0-9]+.[0-9]+.[0-9]+-*"
      - "linear-v[0-9]+.[0-9]+.[0-9]+"
      - "linear-v[0-9]+.[0-9]+.[0-9]+-*"
      - "jira-v[0-9]+.[0-9]+.[0-9]+"
      - "jira-v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package and version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "pkg=issue-provider-${TAG%%-v*}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#*-v}" >> "$GITHUB_OUTPUT"

      - name: Set package version from tag
        run: |
          cargo install cargo-edit --locked
          cargo set-version -p "${{ steps.tag.outputs.pkg }}" "${{ steps.tag.outputs.version }}"
          cargo update --workspace --offline || cargo update --workspace

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate CHANGELOG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Commit version and changelog
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          DEFAULT_BRANCH="$(git remote show origin | sed -n 's/.*HEAD branch: //p')"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): ${{ github.ref_name }}"
          git push origin "HEAD:${DEFAULT_BRANCH}" || true

      - name: Extract release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'body<<EOF'
            git-cliff --config cliff.toml --latest --strip all
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --latest
